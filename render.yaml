databases:
  - name: playto-db
    databaseName: playto
    user: playto
    plan: free

services:
  - type: redis
    name: playto-redis
    plan: free
    ipAllowList: [] # Required by Render. Empty list = internal access only.

  - type: web
    name: playto-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playto-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: playto-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      # Allow frontend to access the API
      - key: CORS_ALLOWED_ORIGINS
        value: "https://playto-frontend.onrender.com"

  - type: worker
    name: playto-celery-worker
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A playto worker -l info
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playto-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: playto-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  - type: worker
    name: playto-celery-beat
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A playto beat -l info
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playto-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: playto-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: playto-frontend
    env: docker
    dockerContext: ./frontend
    dockerfilePath: ./Dockerfile
    plan: free
