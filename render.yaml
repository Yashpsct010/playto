databases:
  - name: playto-db
    databaseName: playto
    user: playto
    plan: free

services:
  - type: redis
    name: playto-redis
    plan: free
    ipAllowList: [] # Required by Render. Empty list = internal access only.

  - type: web
    name: playto-app
    env: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playto-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: playto-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
